<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - Premium Edition</title>
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --gold: #FFD700;
            --neon-pi: #E0E0E0; /* 메인 원장용 */
            --neon-st: #00FFCC; /* 스테이킹용 */
            --neon-lp-rate: #FF00FF; /* 유동성수익용 */
            --neon-lp-total: #39FF14; /* LP공급용 */
            --neon-blue: #00BFFF;
        }

        body {
            margin: 0; padding: 0; background: var(--bg); color: white;
            font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; }

        /* 다국어 선택기 */
        .lang-bar { text-align: right; margin-bottom: 15px; }
        #langSelect { background: #222; color: var(--gold); border: 1px solid var(--gold); padding: 5px; border-radius: 5px; }

        /* 1. 메인 자산 통합 원장 (칼라) */
        header { text-align: center; margin-bottom: 25px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        #txt-ledger { color: var(--neon-pi); font-size: 1.1rem; font-weight: bold; margin-top: 10px; }
        .pi-val { font-size: 3rem; font-weight: bold; color: white; margin: 5px 0; }

        /* 2, 3. 실시간 이율/수익 (칼라) */
        .rate-grid { display: flex; gap: 10px; margin-bottom: 15px; }
        .rate-card { flex: 1; background: var(--card); border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #222; }
        .st-val { color: var(--neon-st); font-size: 1.6rem; font-weight: bold; }
        .lp-rate-val { color: var(--neon-lp-rate); font-size: 1.6rem; font-weight: bold; }

        /* 4. 전체 유동성 LP 공급 (칼라) */
        .total-lp-card { 
            background: var(--card); border: 2px solid var(--neon-lp-total); 
            border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px;
        }
        #total-lp-val { color: var(--neon-lp-total); font-size: 1.8rem; font-weight: 1000; }

        /* 5. HK 양자 방패 (타이틀만 칼라, 내용은 흰색) */
        .shield-box { border: 1.5px solid var(--neon-blue); border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        #txt-shield-title { color: var(--neon-blue); text-align: center; margin: 0 0 10px 0; font-size: 1.2rem; }
        .shield-content { list-style: none; padding: 0; margin: 0; color: white; font-size: 0.9rem; }
        .shield-content li { margin: 10px 0; font-weight: 400; border-left: 3px solid var(--neon-blue); padding-left: 10px; }

        /* 6, 7. 글로벌 AI 고객지원센터 & FAQ */
        .support-btn {
            width: 100%; background: linear-gradient(90deg, #333, #111); color: white;
            padding: 15px; border-radius: 15px; border: 1px solid var(--gold);
            font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 10px;
        }
        .faq-container { display: none; background: #1a1a1a; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .faq-item { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .faq-q { color: var(--gold); font-weight: bold; margin-bottom: 5px; }
        .faq-a { color: #ccc; font-size: 0.85rem; }

        /* 8. 소셜 미디어 버튼 (고객지원센터 바로 밑) */
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; }
        .soc-btn { padding: 12px; border-radius: 10px; text-align: center; text-decoration: none; color: white; font-weight: bold; font-size: 0.85rem; }

        /* AI 비서 */
        #ai-bot {
            position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px;
            background: #FF00FF; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-weight: bold; box-shadow: 0 0 15px #FF00FF;
            cursor: pointer; z-index: 1000; animation: float 3s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        #ai-msg { display: none; position: absolute; bottom: 70px; right: 0; background: white; color: black; padding: 10px; border-radius: 10px; width: 140px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select id="langSelect" onchange="changeLang()">
            <option value="ko">한국어 🇰🇷</option>
            <option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option>
            <option value="ja">日本語 🇯🇵</option>
            </select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-ledger">메인 자산 통합 원장</div>
        <div class="pi-val"><span id="live-pi">412.5545</span> <span style="color:var(--gold)">Pi</span></div>
        <div style="color:var(--neon-lp-total); font-weight:bold;">Value: $ 314,159 (GCV)</div>
    </header>

    <div class="rate-grid">
        <div class="rate-card">
            <div style="font-size:0.75rem; color:#888;">실시간 스테이킹 이율</div>
            <div class="st-val" id="live-st">17.38%</div>
        </div>
        <div class="rate-card">
            <div style="font-size:0.75rem; color:#888;">실시간 유동성 수익</div>
            <div class="lp-rate-val" id="live-lp-rate">24.44%</div>
        </div>
    </div>

    <div class="total-lp-card">
        <div style="font-size:0.85rem; margin-bottom:8px;">전체 유동성 LP 공급</div>
        <div id="total-lp-val">$ 88,429,580,205</div>
    </div>

    <div class="shield-box">
        <h4 id="txt-shield-title">🛡️ HK 양자 방패 가동 중</h4>
        <ul class="shield-content">
            <li>차세대 양자 내성 보안 기술 V30 적용</li>
            <li>파이 메인넷 자산 실시간 지능형 자동 연동</li>
            <li>AI 기반 24H 실시간 전방위 자산 보호 시스템</li>
        </ul>
    </div>

    <button class="support-btn" onclick="toggleFaq()">글로벌 AI 고객지원센터</button>
    <div class="faq-container" id="faqBox">
        <div id="faq-list">
            </div>
        <p style="font-size:0.8rem; text-align:center; color:var(--neon-blue);">지원: support@hkwb.ai.kr</p>
    </div>

    <div class="social-grid">
        <a href="https://www.youtube.com/@Hyekong2025" class="soc-btn" style="background:#FF0000">YOUTUBE</a>
        <a href="https://www.tiktok.com/@hyekong2025" class="soc-btn" style="background:#333; border:1px solid #444">TIKTOK</a>
    </div>
</div>

<div id="ai-bot" onclick="aiTalk()">
    AI
    <div id="ai-msg">무엇을 도와 드릴까요?</div>
</div>

<script>
    // FAQ 데이터 (1~11번)
    const faqs = [
        {q: "1. 서비스 이용 가이드", a: "HK 월드뱅크의 모든 서비스를 이용하는 기본적인 방법입니다."},
        {q: "2. 계정 및 보안 안내", a: "강력한 양자 방패로 보호되는 계정 관리 방법입니다."},
        // ... 중간 생략 ...
        {q: "11. UBI재원과 이율 재원은 어떻게 만드나요?", a: "독자적인 유동성 알고리즘과 글로벌 AI 인프라 수익 모델을 결합하여 창출하며, 이는 혜공 형님의 핵심 금융 공학 설계입니다."}
    ];

    // FAQ 렌더링
    const faqList = document.getElementById('faq-list');
    faqs.forEach(f => {
        faqList.innerHTML += `<div class="faq-item"><div class="faq-q">${f.q}</div><div class="faq-a">${f.a}</div></div>`;
    });

    function toggleFaq() {
        const box = document.getElementById('faqBox');
        box.style.display = (box.style.display === 'block') ? 'none' : 'block';
    }

    function aiTalk() {
        const msg = document.getElementById('ai-msg');
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 3000);
    }

    // 2초마다 수치 변화 (실시간성)
    setInterval(() => {
        document.getElementById('live-pi').innerText = (412 + Math.random()).toFixed(4);
        document.getElementById('live-st').innerText = (17 + Math.random()).toFixed(2) + '%';
        document.getElementById('live-lp-rate').innerText = (24 + Math.random()).toFixed(2) + '%';
        let lpBase = 88429580205 + Math.floor(Math.random() * 100000);
        document.getElementById('total-lp-val').innerText = '$ ' + lpBase.toLocaleString();
    }, 2000);

    function changeLang() {
        // 다국어 전환 로직 (선택된 언어에 따라 텍스트 변경)
        alert("언어 팩을 로드합니다. (20~30개국어 지원)");
    }
</script>
</body>
</html>
