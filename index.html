<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - UBI Global Hub</title>
    <style>
        :root {
            --bg: #000000; --card: #121212; --gold: #FFD700;
            --neon-st: #00FFCC; --neon-lp: #FF00FF; --neon-green: #39FF14; --neon-blue: #00BFFF;
        }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; }
        
        /* 언어 바 개선: 화면 가림 방지 */
        .lang-bar { text-align: right; margin-bottom: 20px; position: sticky; top: 10px; z-index: 2000; }
        #langSelect { background: #111; color: var(--gold); border: 2px solid var(--gold); padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 140px; }

        header { text-align: center; margin-bottom: 25px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 0 0 15px rgba(255,215,0,0.6); }
        #txt-ledger { font-weight: bold; margin-top: 15px; font-size: 1.1rem; background: linear-gradient(90deg, #00FFCC, #FF00FF, #39FF14); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .pi-display { font-size: 2.5rem; font-weight: bold; margin: 10px 0; color: #fff; }
        .val-box { background: rgba(57, 255, 20, 0.1); color: var(--neon-green); padding: 8px 20px; border: 1px solid var(--neon-green); border-radius: 50px; display: inline-block; font-weight: bold; font-size: 1rem; margin-top: 10px; }

        .rate-grid { display: flex; gap: 10px; margin-bottom: 15px; }
        .rate-card { flex: 1; background: var(--card); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #333; }
        
        .lp-total-box { border: 2px solid var(--neon-green); border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 20px; background: rgba(57, 255, 20, 0.08); transition: 0.3s; }
        #lp-total-num { color: #FFFFFF; font-size: 1.6rem; font-weight: 900; }

        .main-btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .m-btn { padding: 15px 5px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .m-btn:active { transform: scale(0.95); filter: brightness(1.2); }

        .icon-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .icon-card { background: var(--card); padding: 18px 10px; border-radius: 15px; text-align: center; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .icon-card:active { transform: scale(0.9); border-color: var(--gold); }

        .center-btn { width: 100%; background: linear-gradient(45deg, #ff4d6d, #ff758c); color: white; padding: 18px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        
        /* 유튜브 & 틱톡 하단 배치 */
        .social-box { display: flex; gap: 10px; margin-bottom: 30px; }
        .social-link { flex: 1; padding: 15px; text-align: center; border-radius: 12px; text-decoration: none; font-weight: bold; color: white; font-size: 0.9rem; }
        .yt-btn { background: #FF0000; }
        .tk-btn { background: #000; border: 1px solid #fff; }

        .faq-section { display: none; background: #0a0a0a; border-radius: 20px; padding: 20px; border: 1px solid #444; margin-top: 20px; margin-bottom: 50px; }
        .faq-q { color: var(--gold); font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        .faq-a { color: #ccc; font-size: 0.8rem; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }

        #ai-bot { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--neon-lp); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 20px var(--neon-lp); cursor: pointer; z-index: 2999; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select id="langSelect" onchange="updateAllLanguage()">
            <option value="ko">한국어 🇰🇷</option><option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option><option value="ja">日本語 🇯🇵</option>
            <option value="vi">Tiếng Việt 🇻🇳</option><option value="es">Español 🇪🇸</option>
            <option value="fr">Français 🇫🇷</option><option value="de">Deutsch 🇩🇪</option>
            <option value="pt">Português 🇵🇹</option><option value="ru">Русский 🇷🇺</option>
            <option value="it">Italiano 🇮🇹</option><option value="tr">Türkçe 🇹🇷</option>
            <option value="hi">हिन्दी 🇮🇳</option><option value="id">Bahasa Indonesia 🇮🇩</option>
        </select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-ledger">메인 자산 통합 원장</div>
        <div class="pi-display"><span id="main-pi">412.3141</span> <span style="color:var(--gold)">Pi</span></div>
        <div class="val-box">$ <span id="main-val">129,540,600</span> (GCV)</div>
    </header>

    <div class="rate-grid">
        <div class="rate-card"><div id="txt-st-label" style="color:var(--neon-st);">스테이킹 이율</div><div id="live-st">17.38%</div></div>
        <div class="rate-card"><div id="txt-lp-label" style="color:var(--neon-lp);">유동성 수익</div><div id="live-lp">28.12%</div></div>
    </div>

    <div class="lp-total-box"><div id="txt-total-lp">전체 유동성 LP 공급</div><div id="lp-total-num">$ 88,432,159,375</div></div>

    <div class="main-btn-grid">
        <button class="m-btn" id="b1" style="background:#fff;" onclick="runEngine('CHECK', 0)">PI 수량</button>
        <button class="m-btn" id="b2" style="background:var(--gold);" onclick="runEngine('SWAP', 5.5)">DEX 스왑</button>
        <button class="m-btn" id="b3" style="background:#28a745; color:white;" onclick="runEngine('LP', 10.2)">LP 공급</button>
    </div>

    <div class="icon-grid">
        <div class="icon-card" onclick="runEngine('SEND', 1.0)">🚀<span class="icon-txt" id="m1">송금</span></div>
        <div class="icon-card" onclick="runEngine('PAY', 2.0)">🛒<span class="icon-txt" id="m2">결제</span></div>
        <div class="icon-card" onclick="runEngine('DEPOSIT', 50)">💰<span class="icon-txt" id="m3">예치</span></div>
        <div class="icon-card" onclick="runEngine('MINE', -10)">🏅<span class="icon-txt" id="m4">보상</span></div>
        <div class="icon-card" onclick="runEngine('UBI', -3.14)">🏦<span class="icon-txt" id="m5">기본소득</span></div>
        <div class="icon-card" onclick="runEngine('EX', 0)">🔄<span class="icon-txt" id="m6">스왑</span></div>
    </div>

    <button class="center-btn" id="txt-center-btn" onclick="toggleFaq()">Global AI Support Center</button>
    <div class="faq-section" id="faqBox"><div id="faq-list"></div></div>

    <div class="social-box">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="social-link yt-btn">YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="social-link tk-btn">TikTok</a>
    </div>
    
    <div style="text-align:center; font-size:0.7rem; color:#444; margin-bottom:20px;">Official Support: support@hkwb.ai.kr</div>
</div>

<div id="ai-bot" onclick="alert('반갑습니다 혜공 형님! 자산을 안전하게 보호 중입니다.')">AI</div>

<script>
    let piBalance = 412.3141;
    let baseVal = 129540600;
    let baseLp = 88432159375;

    const i18n = {
        ko: { ledger: "메인 자산 통합 원장", st: "스테이킹 이율", lp: "유동성 수익", total: "전체 유동성 LP 공급", b1: "PI 수량", b2: "DEX 스왑", b3: "LP 공급", m1: "송금", m2: "결제", m3: "예치", m4: "보상", m5: "기본소득", m6: "스왑", center: "글로벌 AI 지원센터" },
        en: { ledger: "Main Asset Ledger", st: "Staking APR", lp: "Liquidity Yield", total: "Total Liquidity LP", b1: "PI Qty", b2: "DEX Swap", b3: "LP Supply", m1: "Transfer", m2: "Pay", m3: "Deposit", m4: "Reward", m5: "UBI", m6: "Swap", center: "AI Support Center" },
        zh: { ledger: "资产综合账本", st: "质押利率", lp: "流动性收益", total: "总流动性供应", b1: "PI数量", b2: "DEX交换", b3: "LP供应", m1: "转账", m2: "支付", m3: "存款", m4: "奖励", m5: "基本收入", m6: "闪兑", center: "全球AI客服中心" }
    };

    const faqData = [
        { q: "UBI란 무엇입니까?", a: "모든 인류에게 조건 없이 지급되는 기본소득 시스템입니다." },
        { q: "PI 코인 가치는 어떻게 결정되나요?", a: "GCV $314,159 기준과 글로벌 유동성 풀에 의해 결정됩니다." },
        { q: "보안은 안전한가요?", a: "HK 양자 방패 V23 기술로 24시간 자산을 보호합니다." },
        { q: "AI 뱅킹의 장점은?", a: "실시간 자산 최적화와 자동 수익 분배가 가능합니다." }
    ];

    // 테스트 파이 실구동 엔진
    function runEngine(type, amount) {
        if(amount > 0) {
            piBalance -= amount;
            alert(amount + " Pi가 처리되었습니다.");
        } else if(amount < 0) {
            piBalance += Math.abs(amount);
            alert("보상이 지급되었습니다!");
        }
        document.getElementById('main-pi').innerText = piBalance.toFixed(4);
    }

    function updateAllLanguage() {
        const lang = document.getElementById('langSelect').value;
        const d = i18n[lang] || i18n.en;
        
        document.getElementById('txt-ledger').innerText = d.ledger;
        document.getElementById('txt-st-label').innerText = d.st;
        document.getElementById('txt-lp-label').innerText = d.lp;
        document.getElementById('txt-total-lp').innerText = d.total;
        document.getElementById('b1').innerText = d.b1; document.getElementById('b2').innerText = d.b2; document.getElementById('b3').innerText = d.b3;
        const ids = ['m1','m2','m3','m4','m5','m6'];
        ids.forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerText = d[id]; });
        document.getElementById('txt-center-btn').innerText = d.center;

        const list = document.getElementById('faq-list');
        list.innerHTML = faqData.map(item => `<div class="faq-q">${item.q}</div><div class="faq-a">${item.a}</div>`).join('');
    }

    // 모든 숫자 실시간 변동 엔진
    setInterval(() => {
        // 잔액 미세 변동 (실제 살아있는 계정 느낌)
        document.getElementById('main-pi').innerText = (piBalance + (Math.random() * 0.001)).toFixed(4);
        
        // 가치 및 유동성 숫자 변동
        document.getElementById('main-val').innerText = (baseVal + Math.floor(Math.random() * 10000)).toLocaleString();
        document.getElementById('lp-total-num').innerText = '$ ' + (baseLp + Math.floor(Math.random() * 100000)).toLocaleString();
        
        // 이율 변동
        document.getElementById('live-st').innerText = (17 + Math.random()).toFixed(2) + '%';
        document.getElementById('live-lp').innerText = (28 + Math.random()).toFixed(2) + '%';
    }, 1500);

    function toggleFaq() { const f = document.getElementById('faqBox'); f.style.display = f.style.display === 'block' ? 'none' : 'block'; }
    window.onload = updateAllLanguage;
</script>
</body>
</html>
