    <style>
        :root { --gold: #f1c40f; --green: #00ff88; --bg: #000; --card: #121212; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }
        
        /* 상단 네비게이션 */
        .header-nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 10000; padding: 12px 20px; display: flex; justify-content: flex-end; border-bottom: 1px solid var(--border); }
        #langSelect { background: #1a1a1a; color: var(--gold); border: 1px solid var(--gold); padding: 8px 12px; border-radius: 10px; font-size: 13px; font-weight: bold; outline: none; cursor: pointer; }

        .container { max-width: 480px; margin: 0 auto; padding: 80px 20px 40px; }
        header { text-align: center; padding: 20px 0; color: var(--gold); }
        
        /* 자산 대시보드 */
        .main-card { background: linear-gradient(145deg, #1e1e1e, #000); border-radius: 30px; padding: 30px; border: 1px solid #333; text-align: center; margin-bottom: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        #ledger { font-size: 12px; color: var(--gold); margin-bottom: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .balance-val { font-size: 46px; font-weight: 800; margin-bottom: 5px; }
        .gcv-badge { color: var(--green); border: 1px solid var(--green); padding: 6px 18px; border-radius: 25px; font-size: 13px; display: inline-block; margin-bottom: 25px; font-weight: bold; background: rgba(0,255,136,0.05); }
        
        /* 이율 섹션 컬러 포인트 */
        .rates { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .rate-box { background: rgba(255,255,255,0.03); padding: 18px; border-radius: 20px; border: 1px solid var(--border); }
        .rate-box span { display: block; font-size: 11px; color: var(--green); margin-bottom: 8px; font-weight: bold; }
        .rate-box strong { font-size: 20px; color: #fff; font-weight: 800; }

        .lp-total { background: rgba(0, 255, 136, 0.05); border: 1px solid rgba(0,255,136,0.3); border-radius: 22px; padding: 22px; text-align: center; }
        #tvl_label { font-size: 11px; color: #888; font-weight: bold; margin-bottom: 8px; }
        
        /* 버튼 그리드 */
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 25px 0; }
        .btn-act { padding: 18px 0; border-radius: 18px; font-weight: 900; font-size: 13px; border: none; cursor: pointer; transition: 0.2s; }
        .btn-act:active { transform: scale(0.95); }
        .b-white { background: #fff; color: #000; }
        .b-gold { background: var(--gold); color: #000; }
        .b-green { background: #27ae60; color: #fff; }

        /* 하단 메뉴 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 30px; }
        .menu-item { background: var(--card); padding: 22px 5px; border-radius: 22px; text-align: center; border: 1px solid var(--border); cursor: pointer; }
        .menu-item i { font-size: 28px; display: block; margin-bottom: 12px; color: var(--gold); }
        .menu-item span { font-size: 12px; font-weight: 800; color: #bbb; }

        /* 보안 정보 (언어변환 대상) */
        .info-box { background: #080808; border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid #1a1a1a; }
        .info-box h3 { color: #00d4ff; font-size: 16px; margin-bottom: 15px; }
        .info-box p { font-size: 13px; color: #777; margin-bottom: 8px; border-left: 2px solid #00d4ff; padding-left: 10px; }

        .btn-cs { background: linear-gradient(to right, #ff4757, #ff6b81); color: #fff; width: 100%; padding: 20px; border-radius: 20px; font-weight: 900; border: none; font-size: 16px; margin-bottom: 25px; cursor: pointer; }
        
        /* 유튜브/틱톡 링크 */
        .sns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .sns-link { padding: 18px; border-radius: 18px; color: #fff; text-decoration: none; text-align: center; font-size: 13px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
